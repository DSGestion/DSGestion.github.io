            spec.semesters.forEach(sem => {
                const totalCredits = sem.modules.reduce((s,m) => s + m.credits, 0);

                semestersHtml += `
                    <div class="semester">
                        <div class="semester-header" onclick="this.parentElement.classList.toggle('open')">

                renderLicence();

        renderLicence();
